<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e94560" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="400" cy="400" r="380" fill="url(#bgGrad)" stroke="#e94560" stroke-width="4"/>
  <circle cx="400" cy="400" r="340" fill="none" stroke="#e94560" stroke-width="1" opacity="0.2"/>
  
  <g transform="translate(400, 280)" filter="url(#glow)">
    <path d="M-8,0 C-8,-80 -100,-100 -100,-40 C-100,-10 -80,10 -70,20 C-85,35 -95,60 -80,85 C-65,110 -30,115 -8,100" 
          fill="none" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M8,0 C8,-80 100,-100 100,-40 C100,-10 80,10 70,20 C85,35 95,60 80,85 C65,110 30,115 8,100" 
          fill="none" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="0" y2="100" stroke="#e94560" stroke-width="3" opacity="0.5"/>
    <circle cx="-45" cy="15" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="45" cy="15" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="-35" cy="60" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="35" cy="60" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="0" cy="45" r="5" fill="#e94560"/>
    <line x1="-45" y1="15" x2="0" y2="45" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="15" x2="0" y2="45" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
    <line x1="-35" y1="60" x2="0" y2="45" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="60" x2="0" y2="45" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <g transform="translate(400, 430)" opacity="0.9">
    <path d="M0,25 C0,25 -35,-5 -35,-20 C-35,-35 -20,-40 -10,-35 C-3,-31 0,-20 0,-20 C0,-20 3,-31 10,-35 C20,-40 35,-35 35,-20 C35,-5 0,25 0,25Z" 
          fill="url(#accentGrad)" filter="url(#shadow)"/>
  </g>
  
  <text x="400" y="540" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="62" fill="#ffffff" letter-spacing="3">INNERE</text>
  <text x="400" y="610" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="62" fill="url(#accentGrad)" letter-spacing="3">ST&#196;RKE</text>
  <text x="400" y="660" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="300" font-size="22" fill="#aaaacc" letter-spacing="5">PSYCHOLOGIE &#183; WACHSTUM &#183; ST&#196;RKE</text>
</svg>
